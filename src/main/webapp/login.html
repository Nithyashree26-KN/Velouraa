<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FreshFetch Express</title>
    <link href="https://fonts.cdnfonts.com/css/oregon-ldo" rel="stylesheet">
    <style>
        :root {
            --primary-color: #f04f5f; /* Vibrant Zomato Red */
            --primary-hover: #e03546;
            --bg-color: #121212;
            --surface-color: rgba(30, 30, 30, 0.7);
            --text-primary: #ffffff;
            --text-muted: #b3b3b3;
            --border-color: #333333;
            --input-bg: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at top right, rgba(240, 79, 95, 0.15) 0%, transparent 40%),
                radial-gradient(circle at bottom left, rgba(240, 79, 95, 0.1) 0%, transparent 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Animation Keyframes */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        .login-container {
            background-color: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            width: 100%;
            max-width: 420px;
            padding: 45px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            position: relative;
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 35px;
            animation: float 4s ease-in-out infinite;
        }

        .brand-logo h1 {
            font-size: 32px;
            color: var(--text-primary);
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .brand-logo h1 span {
            color: var(--primary-color);
        }

        .brand-logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .login-header {
            margin-bottom: 25px;
        }

        .login-header h2 {
            font-size: 26px;
            color: var(--text-primary);
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: #666;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(240, 79, 95, 0.15);
            background-color: #333;
        }

        .form-group input:focus + label,
        .form-group:focus-within label {
            color: var(--primary-color);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #d83445 100%);
            color: var(--text-primary);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(240, 79, 95, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(240, 79, 95, 0.4);
            background: linear-gradient(135deg, #ff5c6d 0%, var(--primary-hover) 100%);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            color: var(--text-muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider:not(:empty)::before {
            margin-right: 15px;
        }

        .divider:not(:empty)::after {
            margin-left: 15px;
        }

        .social-login {
            display: flex;
            gap: 15px;
        }

        .btn-social {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-social:hover {
            background-color: #383838;
            border-color: #555;
            transform: translateY(-2px);
        }

        .btn-social img {
            width: 20px;
            height: 20px;
        }

        .signup-link {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .signup-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: #ff6b7b;
            text-decoration: underline;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text-primary);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <a href="restaurant" class="close-btn">✕</a>
        
        <div class="brand-logo">
            <h1>🍕 <span>FreshFetch</span></h1>
            <p>Premium food, blazing fast delivery.</p>
        </div>

        <div class="login-header">
            <h2>Welcome Back</h2>
            <p>Enter your details to access your account</p>
            <p id="error-msg" style="color: var(--primary-color); display: none; margin-top: 10px; font-size: 14px; font-weight: 600;">Invalid email or password. Please try again.</p>
        </div>
        
        <script>
            if (window.location.search.includes('error=1')) {
                document.getElementById('error-msg').style.display = 'block';
            }
        </script>

        <form action="LoginServlet" method="POST">
            <div class="form-group">
                <label for="email">Email or Mobile Number</label>
                <input type="text" id="email" name="email" placeholder="e.g. 9876543210" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-submit">Login Securely</button>
        </form>

        <div class="divider">or continue with</div>

        <div class="social-login">
            <button class="btn-social">
                <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" alt="Google">
                Google
            </button>
            <button class="btn-social">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Facebook_logo_%28square%29.png/800px-Facebook_logo_%28square%29.png" alt="Facebook">
                Facebook
            </button>
        </div>

        <div class="signup-link">
            New to FreshFetch? <a href="registration.html">Create an account</a>
        </div>
    </div>

</body>
</html>
