<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Menu</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
}

h1{
    text-align:center;
    padding:30px;
    color:#ff6b35;
    font-size:40px;
}

.menu-container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
    padding-bottom:40px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    margin:15px;
    color:#333;
}

.card p{
    margin:0 15px;
    color:#ff6b35;
    font-size:22px;
    font-weight:bold;
}

.card button{
    width:90%;
    margin:15px;
    padding:12px;
    border:none;
    background:#ff6b35;
    color:white;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.card button:hover{
    background:#e65b2f;
}

</style>

</head>

<body>

<h1>Our Menu</h1>

<div class="menu-container">

    <div class="card">
        <img src="images/biryani.jpg" alt="Chicken Biryani">
        <h3>Chicken Biryani</h3>
        <p>₹299</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/pizza.jpg" alt="Pizza">
        <h3>Margherita Pizza</h3>
        <p>₹249</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/burger.jpg" alt="Burger">
        <h3>Cheese Burger</h3>
        <p>₹199</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/pasta.jpg" alt="Pasta">
        <h3>White Sauce Pasta</h3>
        <p>₹229</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/noodles.jpg" alt="Noodles">
        <h3>Hakka Noodles</h3>
        <p>₹179</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/friedrice.jpg" alt="Fried Rice">
        <h3>Veg Fried Rice</h3>
        <p>₹169</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/dosa.jpg" alt="Masala Dosa">
        <h3>Masala Dosa</h3>
        <p>₹129</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/paneertikka.jpg" alt="Paneer Tikka">
        <h3>Paneer Tikka</h3>
        <p>₹279</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/cake.jpg" alt="Chocolate Cake">
        <h3>Chocolate Cake</h3>
        <p>₹149</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/icecream.jpg" alt="Ice Cream">
        <h3>Vanilla Ice Cream</h3>
        <p>₹99</p>
        <button>Add to Cart</button>
    </div>

</div>

</body>
</html>
