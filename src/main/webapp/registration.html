<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Velouraa Express</title>
    <link href="https://fonts.cdnfonts.com/css/oregon-ldo" rel="stylesheet">
    <style>
        :root {
            --primary-color: #f04f5f; /* Vibrant Zomato Red */
            --primary-hover: #e03546;
            --bg-color: #121212;
            --surface-color: rgba(30, 30, 30, 0.7);
            --text-primary: #ffffff;
            --text-muted: #b3b3b3;
            --border-color: #333333;
            --input-bg: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at top left, rgba(240, 79, 95, 0.15) 0%, transparent 40%),
                radial-gradient(circle at bottom right, rgba(240, 79, 95, 0.1) 0%, transparent 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Animation Keyframes */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        .register-container {
            background-color: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            width: 100%;
            max-width: 480px;
            padding: 45px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            position: relative;
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
            animation: float 4s ease-in-out infinite;
        }

        .brand-logo h1 {
            font-size: 32px;
            color: var(--text-primary);
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .brand-logo h1 span {
            color: var(--primary-color);
        }

        .register-header {
            margin-bottom: 25px;
        }

        .register-header h2 {
            font-size: 26px;
            color: var(--text-primary);
            font-weight: 700;
            margin-bottom: 6px;
        }

        .register-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }
        
        .form-row .form-group {
            flex: 1;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: #666;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(240, 79, 95, 0.15);
            background-color: #333;
        }

        .form-group input:focus + label,
        .form-group:focus-within label {
            color: var(--primary-color);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #d83445 100%);
            color: var(--text-primary);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(240, 79, 95, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(240, 79, 95, 0.4);
            background: linear-gradient(135deg, #ff5c6d 0%, var(--primary-hover) 100%);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .terms-text {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 15px;
            line-height: 1.5;
        }

        .terms-text a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .terms-text a:hover {
            color: #ff6b7b;
            text-decoration: underline;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #ff6b7b;
            text-decoration: underline;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text-primary);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }
    </style>
</head>
<body>

    <div class="register-container">
        <a href="restaurant" class="close-btn">✕</a>
        
        <div class="brand-logo">
            <h1>🍕 <span>Velouraa</span></h1>
        </div>

        <div class="register-header">
            <h2>Sign Up</h2>
            <p>Join Velouraa to explore best local foods</p>
        </div>

        <form action="RegisterServlet" method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" name="fname" placeholder="e.g. John" required>
                </div>
                <div class="form-group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" name="lname" placeholder="e.g. Doe" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Mobile Number</label>
                <input type="tel" id="phone" name="phone" placeholder="e.g. 9876543210" required>
            </div>

            <div class="form-group">
                <label for="password">Create Password</label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
            </div>

            <button type="submit" class="btn-submit">Create Account</button>
            
            <p class="terms-text">
                By creating an account, I accept the <a href="#">Terms & Conditions</a> & <a href="#">Privacy Policy</a>
            </p>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

</body>
</html>
